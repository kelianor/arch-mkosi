# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install and create distrobox
        run: |
          sudo apt install distrobox podman
          distrobox create --yes --image archlinux --init --unshare-all archlinux

      - name: Install mkosi into a container
        run: distrobox enter archlinux -- sudo pacman -Syu --noconfirm mkosi cpio mtools erofs-utils btrfs-progs systemd-ukify dosfstools arch-install-scripts

        
      - name: Copy secret key
        env:
          MKOSI_KEY: ${{ secrets.MKOSI_KEY }}
        run: echo -n "$MKOSI_KEY" | base64 -d > ./mkosi.key
        
      - name: Copy certificate
        env:
          MKOSI_KEY: ${{ secrets.MKOSI_CRT }}
        run: echo -n "$MKOSI_CRT" | base64 -d > ./mkosi.crt

      - name: Secure permissions
        run: chmod 600 mkosi.key mkosi.crt
      - name: Build a mkosi
        run: |
          mkdir mkosi.cache
          mkdir mkosi.output
          distrobox enter archlinux -- mkosi -B -f
